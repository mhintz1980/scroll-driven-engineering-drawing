<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- Hexagon outline (engineering/mechanical motif) -->
  <polygon points="16,4 27,10 27,22 16,28 5,22 5,10" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner "M" letterform in engineering style -->
  <polyline points="10,22 10,11 16,18 22,11 22,22" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
